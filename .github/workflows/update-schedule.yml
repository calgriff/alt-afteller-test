name: Update ARTIS schedule

on:
  schedule:
    # every 30 minutes — GitHub Actions cron runs in UTC; adjust if you
    # want it tighter around opening hours (09:00–18:00 Europe/Amsterdam)
    - cron: "*/30 * * * *"
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  update-schedule:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run scraper
        run: node scrape.mjs

      - name: Commit schedule.json if it changed
        run: |
          git config user.name "artis-schedule-bot"
          git config user.email "actions@users.noreply.github.com"
          git add schedule.json
          git diff --cached --quiet && echo "No changes" || git commit -m "Update schedule.json [automated]"
          git push
