name: Update ARTIS schedule

on:
  schedule:
    # Run at :30 past the hour, 08:30-17:30 Europe/Amsterdam.
    # GitHub Actions cron always runs in UTC, and Amsterdam's UTC offset
    # changes with daylight saving (CET = UTC+1, CEST = UTC+2), so this is
    # split into two rules to keep the local time correct across the year.
    # Each will be off by 1 hour for the few days between the actual DST
    # switch and these month boundaries, which is harmless here.
    - cron: "30 6-15 * 4-9 *"     # Apr-Sep (CEST, UTC+2) -> 08:30-17:30 local
    - cron: "30 7-16 * 1-3,10-12 *" # Oct-Mar (CET, UTC+1) -> 08:30-17:30 local
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  update-schedule:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run scraper
        run: node scrape.mjs

      - name: Commit schedule.json if it changed
        run: |
          git config user.name "artis-schedule-bot"
          git config user.email "actions@users.noreply.github.com"
          git add schedule.json
          git diff --cached --quiet && echo "No changes" || git commit -m "Update schedule.json [automated]"
          git push
