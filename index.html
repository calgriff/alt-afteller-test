<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Afteller | ARTIS Planetarium</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  /* Omnes — bundled locally in ./fonts (see README) */
  @font-face { font-family: "Omnes"; src: url("fonts/Omnes-Light.otf") format("opentype"); font-weight: 100 300; font-style: normal; font-display: swap; }
  @font-face { font-family: "Omnes"; src: url("fonts/Omnes-Regular.otf") format("opentype"); font-weight: 400; font-style: normal; font-display: swap; }
  @font-face { font-family: "Omnes"; src: url("fonts/Omnes-Medium.otf") format("opentype"); font-weight: 500; font-style: normal; font-display: swap; }
  @font-face { font-family: "Omnes"; src: url("fonts/Omnes-Semibold.otf") format("opentype"); font-weight: 600 900; font-style: normal; font-display: swap; }

  :root {
    --bg: #060b18;
    --text: #ffffff;
  }
  * { box-sizing: border-box; }
  /* Design is authored for a 1080x1920 portrait screen.
     1rem = 10px at 1080 wide; everything scales proportionally. */
  html { font-size: calc(100vw / 108); }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: "Omnes", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  body { overflow: hidden; }

  .c-narrowcasting-countdown {
    display: flex; flex-direction: column;
    height: 100vh;
    padding: 2rem 6rem 2.5rem;
  }

  /* ---- highlighted (next) show ---------------------------------------- */
  .narrowcasting-countdown__highlight { display: none; }
  /* Equal vertical rhythm between the stacked lines (Over / time / minuten /
     begint / title / info) is handled by a single flex gap. */
  .narrowcasting-countdown__highlight:not(.narrowcasting-countdown__highlight--is-hidden) {
    display: flex; flex-direction: column; gap: 2.8rem;
  }

  .highlight__over {
    margin: 0;
    font-size: 11.5rem; font-weight: 300;
    text-transform: uppercase; line-height: 1.05;
    letter-spacing: .005em;
  }
  .highlight__time {
    margin: 0 0 0 -0.4rem;
    font-size: 25.5rem; font-weight: 200;
    line-height: 1.05;
    font-variant-numeric: tabular-nums;
    letter-spacing: .06em;
    white-space: nowrap;
  }
  /* countdown longer than an hour renders HH:MM:SS — shrink so it fits */
  .narrowcasting-countdown__highlight:not(.narrowcasting-countdown--less-than-hour) .highlight__time {
    font-size: 16rem; letter-spacing: .05em;
  }
  .highlight__minuten,
  .highlight__begint {
    margin: 0;
    font-size: 11rem; font-weight: 300;
    text-transform: uppercase; line-height: 1.15;
    letter-spacing: .005em;
  }
  .highlight__title {
    margin: 0;
    font-size: 12rem; font-weight: 700;
    text-transform: uppercase; line-height: 1.08;
    letter-spacing: .01em;
    overflow-wrap: anywhere;
  }
  /* title -> info separator */
  .highlight__info {
    border-top: .3rem solid var(--text);
    padding-top: 2.8rem;
  }
  .highlight__meta {
    display: flex; justify-content: space-between; gap: 2rem;
    font-size: 1.8rem; font-weight: 600;
    letter-spacing: .22em; text-transform: uppercase;
    white-space: nowrap;
  }
  .highlight__meta:empty { display: none; }
  .highlight__description {
    margin: 3rem 0 0;
    font-size: 3.3rem; font-weight: 400;
    line-height: 1.6;
    letter-spacing: .01em;
  }

  /* ---- empty state ----------------------------------------------------- */
  .narrowcasting-countdown__empty { display: none; }
  .narrowcasting-countdown__empty:not(.narrowcasting-countdown__empty--is-hidden) {
    display: flex; flex-direction: column; gap: 9rem; margin-top: 4rem;
  }
  .narrowcasting-countdown__empty h2 {
    margin: 0;
    font-size: 8.8rem; font-weight: 700;
    text-transform: uppercase; line-height: 1.15;
    letter-spacing: .005em;
  }
  .narrowcasting-countdown__empty .empty__en { font-weight: 300; }
  .empty__divider {
    height: .6rem;
    background-image: repeating-linear-gradient(90deg,
      var(--text) 0 1.5rem, transparent 1.5rem 2.5rem);
  }

  /* ---- bottom cluster: divider / upcoming list / clock ------------------ */
  .countdown__spacer { flex: 1; }

  .countdown__divider {
    height: .6rem;
    background-image: repeating-linear-gradient(90deg,
      var(--text) 0 1.5rem, transparent 1.5rem 2.5rem);
    margin-bottom: 2.8rem;
  }
  .countdown--is-empty .narrowcasting-countdown__list { display: none; }

  .narrowcasting-countdown__list { list-style: none; margin: 0; padding: 0; }
  .event {
    display: flex; align-items: flex-start; gap: 5rem;
    margin-bottom: 2.5rem;
  }
  .event--is-hidden { display: none; }
  .event__time {
    margin: 0;
    font-size: 5rem; font-weight: 700;
    line-height: 1.1;
    font-variant-numeric: tabular-nums;
  }
  .event__body { width: fit-content; }
  .event__title {
    margin: 0;
    font-size: 5.2rem; font-weight: 700;
    text-transform: uppercase; line-height: 1.05;
    letter-spacing: .005em;
  }
  .event__description {
    margin: .6rem 0 0;
    font-size: 1.9rem; font-weight: 400;
    line-height: 1.4;
    text-align: center;
  }

  .narrowcasting-countdown__clock {
    margin: 1.5rem 0 0;
    align-self: center;
    font-size: 3.8rem; font-weight: 500;
    font-variant-numeric: tabular-nums;
  }

  /* ---- debug/QA harness (only visible with URL params, see README) ----- */
  .debug-bar {
    position: fixed; top: .8rem; right: .8rem; z-index: 998;
    max-width: 46rem;
    background: rgba(10, 24, 44, .92);
    border: 1px solid #2c4a52;
    border-radius: .8rem;
    padding: 1rem 1.4rem;
    font-size: 1.4rem; line-height: 1.5;
    color: #9fb2c3;
  }
  .debug-bar[hidden] { display: none; }
  .debug-bar strong { color: #6fd3c7; }
  .debug-bar code {
    background: #0006; padding: 0 .5rem; border-radius: .4rem; color: #fff;
  }

  .flash {
    position: fixed; inset: 0; background: #fff; opacity: 0;
    pointer-events: none; z-index: 999;
  }
  .flash.active { animation: flashAnim .5s ease; }
  @keyframes flashAnim { 0% { opacity: .9; } 100% { opacity: 0; } }
</style>
</head>
<body>

<div class="debug-bar" id="debug-bar" hidden>
  <div><strong>Debug/QA harness</strong></div>
  <div>Fake time: <code id="dbg-now">--:--:--</code></div>
  <div>Next reload in: <code id="dbg-reload">--</code></div>
  <div>Fix delay: <code id="dbg-fixdelay">--</code>s</div>
  <div>Schedule: <code id="dbg-source">loading&hellip;</code></div>
  <div>Params: <code>?fakeNow=13:59:50&amp;timeScale=10&amp;fixDelay=3</code></div>
</div>

<main class="c-narrowcasting-countdown c-narrowcasting narrowcasting--portrait"
      js-hook-narrowcasting-countdown>

  <div id="highlights-container"></div>

  <div class="narrowcasting-countdown__empty narrowcasting-countdown__empty--is-hidden" js-hook-narrowcasting-countdown-empty>
    <h2>De shows in het Planetarium zijn afgelopen voor vandaag.</h2>
    <div class="empty__divider"></div>
    <h2 class="empty__en">The Planetarium shows have finished for today.</h2>
  </div>

  <div class="countdown__spacer"></div>

  <div class="countdown__divider"></div>

  <ul class="narrowcasting-countdown__list" id="list-container"></ul>

  <p class="narrowcasting-countdown__clock" js-hook-narrowcasting-countdown-clock>--:--</p>
</main>

<div class="flash" id="flash"></div>
<script src="countdown.js"></script>
</body>
</html>
